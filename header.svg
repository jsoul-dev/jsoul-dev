<svg xmlns="http://www.w3.org/2000/svg" width="620" height="160" viewBox="0 0 620 160" role="img" aria-label="JC profile header">
  <defs>
    <!-- Red accent glow -->
    <radialGradient id="redGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#ff1e1e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <!-- Eclipse Glow -->
    <radialGradient id="eclipseGlow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#000" stop-opacity="1"/>
      <stop offset="85%" stop-color="#ff1e1e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <filter id="softBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .bg { fill: #050505; }
    .glow-red { stroke: #ff1e1e; }
    .avatar-circle { fill: none; stroke: #ff1e1e; stroke-width: 2; filter: url(#glow); }
    .initials { font: 700 36px "Cinzel", "Times New Roman", serif; fill: #f5f5f5; }
    .name { font: 700 24px "Cinzel", "Times New Roman", serif; fill: #f5f5f5; }
    .tag { font: 400 14px "Segoe UI", system-ui, sans-serif; fill: #888; }

    /* floating red particles / ashes */
    @keyframes float1 { 0% { transform: translate(0, 0); opacity:0 } 20% { opacity: 0.8 } 80% { opacity: 0.8 } 100% { transform: translate(15px, -20px); opacity:0 } }
    @keyframes float2 { 0% { transform: translate(0, 0); opacity:0 } 20% { opacity: 0.6 } 80% { opacity: 0.6 } 100% { transform: translate(-10px, -25px); opacity:0 } }
    .p1 { animation: float1 4s ease-in-out infinite; fill: #ff1e1e; }
    .p2 { animation: float2 5s ease-in-out infinite; fill: #cc0000; }
    .p3 { animation: float1 6s ease-in-out infinite; animation-delay: 2s; fill: #ff4444; }

    /* radial streak pulse animation */
    @keyframes streakPulse {
      0% { opacity: 0.1; transform: scale(0.95); }
      50% { opacity: 0.8; transform: scale(1.05); }
      100% { opacity: 0.1; transform: scale(0.95); }
    }

    .eclipse-corona {
      animation: streakPulse 3s ease-in-out infinite alternate;
      transform-origin: 50% 50%;
    }

    /* text entrance */
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateX(-15px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    .txt { animation: fadeIn 1s ease forwards; opacity: 0; }
    
    /* Typing animation */
    .typing-text { font: 700 22px "Courier New", monospace; fill: #e0e0e0; }
    .highlight { fill: #ff1e1e; filter: url(#glow); }
    
    @keyframes typing {
      0%, 10% { opacity: 0; }
      10.1% { opacity: 1; }
      100% { opacity: 1; }
    }
    
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    
    .char { opacity: 0; }
    .char1 { animation: typing 4s steps(1) infinite; animation-delay: 0.1s; }
    .char2 { animation: typing 4s steps(1) infinite; animation-delay: 0.2s; }
    .char3 { animation: typing 4s steps(1) infinite; animation-delay: 0.3s; }
    .char4 { animation: typing 4s steps(1) infinite; animation-delay: 0.4s; }
    .char5 { animation: typing 4s steps(1) infinite; animation-delay: 0.5s; }
    .char6 { animation: typing 4s steps(1) infinite; animation-delay: 0.6s; }
    .char7 { animation: typing 4s steps(1) infinite; animation-delay: 0.7s; }
    .char8 { animation: typing 4s steps(1) infinite; animation-delay: 0.8s; }
    .char9 { animation: typing 4s steps(1) infinite; animation-delay: 0.9s; }
    .char10 { animation: typing 4s steps(1) infinite; animation-delay: 1.0s; }
    .char11 { animation: typing 4s steps(1) infinite; animation-delay: 1.1s; }
    .char12 { animation: typing 4s steps(1) infinite; animation-delay: 1.2s; }
    .char13 { animation: typing 4s steps(1) infinite; animation-delay: 1.3s; }
    .char14 { animation: typing 4s steps(1) infinite; animation-delay: 1.4s; }
    .char15 { animation: typing 4s steps(1) infinite; animation-delay: 1.5s; }
    .char16 { animation: typing 4s steps(1) infinite; animation-delay: 1.6s; }
    .char17 { animation: typing 4s steps(1) infinite; animation-delay: 1.7s; }
    .char18 { animation: typing 4s steps(1) infinite; animation-delay: 1.8s; }
    .char19 { animation: typing 4s steps(1) infinite; animation-delay: 1.9s; }
    .char20 { animation: typing 4s steps(1) infinite; animation-delay: 2.0s; }
    .char21 { animation: typing 4s steps(1) infinite; animation-delay: 2.1s; }
    .char22 { animation: typing 4s steps(1) infinite; animation-delay: 2.2s; }
    .char23 { animation: typing 4s steps(1) infinite; animation-delay: 2.3s; }
    .char24 { animation: typing 4s steps(1) infinite; animation-delay: 2.4s; }
    .char25 { animation: typing 4s steps(1) infinite; animation-delay: 2.5s; }
    .char26 { animation: typing 4s steps(1) infinite; animation-delay: 2.6s; }
    .char27 { animation: typing 4s steps(1) infinite; animation-delay: 2.7s; }
    .char28 { animation: typing 4s steps(1) infinite; animation-delay: 2.8s; }
    .char29 { animation: typing 4s steps(1) infinite; animation-delay: 2.9s; }
    
    .cursor {
      animation: blink 0.7s step-end infinite;
      animation-delay: 3s;
      fill: #ff1e1e;
    }
  </style>

  <!-- Background -->
  <rect width="620" height="160" class="bg"/>

  <!-- Eclipse Background -->
  <g transform="translate(480, 80)">
    <circle cx="0" cy="0" r="140" fill="url(#redGlow)" opacity="0.6"/>
    <circle cx="0" cy="0" r="65" fill="#ff1e1e" class="eclipse-corona" filter="url(#softBlur)"/>
    <circle cx="0" cy="0" r="60" fill="#050505"/>
  </g>

  <!-- Floating Ashes/Sparks -->
  <circle cx="50" cy="120" r="1.5" class="p1"/>
  <circle cx="150" cy="140" r="2" class="p2"/>
  <circle cx="280" cy="110" r="1" class="p3"/>
  <circle cx="420" cy="130" r="2.5" class="p1" style="animation-delay: 1s"/>
  <circle cx="550" cy="90" r="1.5" class="p2" style="animation-delay: 2.5s"/>
  <circle cx="100" cy="40" r="1.5" class="p3" style="animation-delay: 0.5s"/>
  <circle cx="350" cy="30" r="2" class="p1" style="animation-delay: 1.5s"/>

  <!-- Avatar area -->
  <g transform="translate(60,20)">
    <!-- Brand of Sacrifice inside Avatar -->
    <g transform="translate(40,60)">
      <path d="M 0,-22 L 0,22 M -3,-18 L 0,-24 L 3,-18 M 0,-2 L -16,-16 L -10,-22 M 0,-2 L 16,-16 L 10,-22 M 0,-5 L -16,10 L 0,22 L 16,10 Z" 
            stroke="#ff1e1e" stroke-width="3" stroke-linejoin="miter" stroke-linecap="square" fill="none" filter="url(#glow)"/>
      <path d="M 0,-22 L 0,22 M -3,-18 L 0,-24 L 3,-18 M 0,-2 L -16,-16 L -10,-22 M 0,-2 L 16,-16 L 10,-22 M 0,-5 L -16,10 L 0,22 L 16,10 Z" 
            stroke="#ffffff" stroke-width="1" stroke-linejoin="miter" stroke-linecap="square" fill="none" opacity="0.6"/>
    </g>
    <!-- Avatar circle -->
    <circle class="avatar-circle" cx="40" cy="60" r="36"/>
    <!-- Transparent inner circle -->
    <circle cx="40" cy="60" r="30" fill="none" stroke="#550000" stroke-width="1.5"/>
  </g>

  <!-- Typing SVG on the right -->
  <g transform="translate(175,85)">
    <text class="typing-text" text-anchor="start">
      <tspan class="char char1">H</tspan><tspan class="char char2">e</tspan><tspan class="char char3">y</tspan><tspan class="char char4"> </tspan><tspan class="char char5">t</tspan><tspan class="char char6">h</tspan><tspan class="char char7">e</tspan><tspan class="char char8">r</tspan><tspan class="char char9">e</tspan><tspan class="char char10">!</tspan><tspan class="char char11"> </tspan><tspan class="char char12">W</tspan><tspan class="char char13">e</tspan><tspan class="char char14">l</tspan><tspan class="char char15">c</tspan><tspan class="char char16">o</tspan><tspan class="char char17">m</tspan><tspan class="char char18">e</tspan><tspan class="char char19"> </tspan><tspan class="char char20 highlight">S</tspan><tspan class="char char21 highlight">t</tspan><tspan class="char char22 highlight">r</tspan><tspan class="char char23 highlight">u</tspan><tspan class="char char24 highlight">g</tspan><tspan class="char char25 highlight">g</tspan><tspan class="char char26 highlight">l</tspan><tspan class="char char27 highlight">e</tspan><tspan class="char char28 highlight">r</tspan><tspan class="char char29 highlight">!</tspan>
    </text>
  </g>
</svg>
